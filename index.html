<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AI Radar - Daily AI Intelligence Brief</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #e5e5e5;
            --text-secondary: #9ca3af;
            --accent: #667eea;
        }

        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --bg-tertiary: #e5e7eb;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        .card { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); transition: all 0.3s; position: relative; }
        .card:hover { border-color: #3a3a3a; transform: translateY(-2px); }
        .card.read { opacity: 0.6; border-left: 3px solid #10b981; }
        .card.bookmarked::before { content: "🔖"; position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; }
        
        .tab { cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--accent); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .control-btn { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; transition: all 0.2s; }
        .control-btn:hover { background: var(--bg-tertiary); border-color: var(--accent); }
        
        .progress-bar { height: 4px; background: var(--bg-tertiary); position: fixed; top: 0; left: 0; right: 0; z-index: 999; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #764ba2); transition: width 0.3s; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); border-radius: 0.5rem; padding: 2rem; max-width: 600px; max-height: 80vh; overflow-y: auto; }

        .reading-time { color: var(--text-secondary); font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.25rem; }
        
        .nav-controls { position: fixed; right: 2rem; bottom: 2rem; display: flex; flex-direction: column; gap: 0.5rem; z-index: 100; }
        .nav-btn { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); padding: 0.75rem; border-radius: 9999px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .nav-btn:hover { background: var(--accent); color: white; transform: scale(1.1); }
        .sort-btn { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); padding: 0.4rem 0.75rem; border-radius: 0.375rem; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; color: var(--text-secondary); }
        .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
        .source-chip { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); padding: 0.35rem 0.75rem; border-radius: 9999px; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); transition: all 0.2s; }
        .source-chip:hover { border-color: var(--accent); color: var(--accent); }
        .source-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4 mb-6">
                <div>
                    <h1 class="text-4xl font-bold mb-2"><span style="background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent">⚡ AI Radar</span></h1>
                    <p class="text-gray-400" id="dateDisplay">Loading...</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="toggleTheme()" class="control-btn" title="Toggle theme (T)">
                        <span id="themeIcon">🌙</span>
                    </button>
                    <button onclick="showStats()" class="control-btn" title="Stats (S)">📊</button>
                    <button onclick="showHelp()" class="control-btn" title="Help (?)">⌨️</button>
                    <button onclick="exportMD()" class="control-btn" title="Export (E)">📥</button>
                </div>
            </div>
            <div class="p-6 bg-gradient-to-r from-purple-900/20 to-blue-900/20 rounded-lg border border-purple-500/20 mb-4">
                <p class="text-xl font-medium mb-2" id="headline">Loading...</p>
                <p class="reading-time">⏱️ <span id="totalReadingTime">-</span> estimated reading time</p>
            </div>

        </header>

        <div id="loading" class="flex justify-center items-center min-h-[60vh]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500"></div>
        </div>

        <nav id="tabs" class="hidden mb-8 border-b border-gray-800 overflow-x-auto"></nav>
        <main id="content" class="hidden"></main>
        
        <footer id="footer" class="hidden mt-12 pt-8 border-t border-gray-800 text-gray-400 text-sm">
            <div class="flex justify-between">
                <div><p>Last updated: <span id="lastUpdated">-</span></p></div>
                <div class="text-right"><p class="text-xs">Press <kbd class="bg-gray-800 px-2 py-1 rounded">?</kbd> for shortcuts</p></div>
            </div>
        </footer>
    </div>

    <!-- Navigation Controls -->
    <div class="nav-controls">
        <button onclick="scrollToTop()" class="nav-btn" title="Scroll to top (Home)">↑</button>
        <button onclick="prevSection()" class="nav-btn" title="Previous section (←)">←</button>
        <button onclick="nextSection()" class="nav-btn" title="Next section (→)">→</button>
    </div>

    <!-- Modals -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4">⌨️ Keyboard Shortcuts</h2>
            <div class="space-y-2 text-sm">
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">←</kbd> / <kbd class="bg-gray-700 px-2 py-1 rounded">→</kbd> Previous/Next section</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">Home</kbd> Scroll to top</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">m</kbd> Mark as read</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">b</kbd> Bookmark</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">t</kbd> Toggle theme</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">s</kbd> Stats</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">e</kbd> Export</p>
                <p><kbd class="bg-gray-700 px-2 py-1 rounded">Esc</kbd> Close</p>
            </div>
            <button onclick="closeModals()" class="mt-6 w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded">Close</button>
        </div>
    </div>

    <div id="statsModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4">📊 Reading Statistics</h2>
            <div id="statsContent"></div>
            <button onclick="closeModals()" class="mt-6 w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
