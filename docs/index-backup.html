<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AI Radar - Your Daily AI News Brief</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f0f0f;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .tab {
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .source-badge {
            background: #2a2a2a;
            color: #9ca3af;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            display: inline-block;
        }

        .meta-info {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .published-date {
            color: #6b7280;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .published-date::before {
            content: "🕐";
            font-size: 0.875rem;
        }

        .why-matters {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 3px solid #667eea;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            border-radius: 0.25rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .spinner {
            border: 3px solid #2a2a2a;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin: 2rem 0;
        }

        .archive-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
            min-width: 200px;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .archive-dropdown.show {
            display: block;
        }

        .archive-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .archive-item:hover {
            background: #2a2a2a;
        }

        .section-emoji {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }

        .filter-bar {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-input {
            background: #0f0f0f;
            border: 1px solid #3a3a3a;
            color: #e5e5e5;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            width: 100%;
            max-width: 400px;
        }

        .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats-badge {
            background: #2a2a2a;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .featured-indicator {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #667eea;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold mb-2">
                        <span class="gradient-text">⚡ AI Radar</span>
                    </h1>
                    <p class="text-gray-400" id="dateDisplay">Loading...</p>
                </div>
                <div class="relative">
                    <button
                        id="archiveBtn"
                        class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors flex items-center gap-2"
                    >
                        📅 Archive
                    </button>
                    <div id="archiveDropdown" class="archive-dropdown"></div>
                </div>
            </div>
            <div class="mt-6 p-6 bg-gradient-to-r from-purple-900/20 to-blue-900/20 rounded-lg border border-purple-500/20">
                <p class="text-lg md:text-xl font-medium" id="headline">Loading today's brief...</p>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state hidden">
            <h3 class="text-xl font-bold text-red-400 mb-2">Failed to Load Brief</h3>
            <p class="text-gray-300" id="errorMessage"></p>
        </div>

        <!-- Navigation Tabs -->
        <nav id="tabNav" class="hidden mb-8 border-b border-gray-800 overflow-x-auto">
            <div class="flex gap-6 min-w-max" id="tabs"></div>
        </nav>

        <!-- Content -->
        <main id="content" class="hidden">
            <div id="sections"></div>
        </main>

        <!-- Footer -->
        <footer id="footer" class="hidden mt-12 pt-8 border-t border-gray-800 text-gray-400 text-sm">
            <div class="flex flex-col md:flex-row justify-between gap-4">
                <div>
                    <p>Last updated: <span id="lastUpdated">-</span></p>
                    <p class="mt-1">
                        <span id="sourcesChecked">-</span> sources checked •
                        <span id="itemsProcessed">-</span> items processed •
                        <span id="itemsFeatured">-</span> featured
                    </p>
                </div>
                <div class="text-right">
                    <p class="text-xs">Generated by AI Radar</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let currentBrief = null;
        let currentSection = null;

        // Fetch and render the latest brief
        async function loadBrief(archiveDate = null) {
            const loadingEl = document.getElementById('loadingState');
            const errorEl = document.getElementById('errorState');
            const contentEl = document.getElementById('content');
            const tabNavEl = document.getElementById('tabNav');
            const footerEl = document.getElementById('footer');

            // Show loading
            loadingEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
            contentEl.classList.add('hidden');
            tabNavEl.classList.add('hidden');
            footerEl.classList.add('hidden');

            try {
                const url = archiveDate
                    ? `../data/archive/${archiveDate}.json`
                    : '../data/latest.json';

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                currentBrief = await response.json();
                renderBrief(currentBrief);

            } catch (error) {
                console.error('Error loading brief:', error);
                errorEl.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        // Render the brief
        function renderBrief(brief) {
            // Update header
            document.getElementById('dateDisplay').textContent = formatDate(brief.date);
            document.getElementById('headline').textContent = brief.headline;

            // Render tabs
            const tabsEl = document.getElementById('tabs');
            tabsEl.innerHTML = '';

            brief.sections.forEach((section, index) => {
                const tab = document.createElement('div');
                tab.className = 'tab py-3 px-1';
                tab.innerHTML = `<span class="section-emoji">${section.emoji}</span>${section.title}`;
                tab.onclick = () => switchSection(section.id);
                tabsEl.appendChild(tab);
            });

            // Add "All News" tab if we have all_items
            if (brief.all_items && brief.all_items.length > 0) {
                const allTab = document.createElement('div');
                allTab.className = 'tab py-3 px-1';
                allTab.innerHTML = `<span class="section-emoji">📰</span>All News (${brief.all_items.length})`;
                allTab.onclick = () => switchSection('all_news');
                tabsEl.appendChild(allTab);
            }

            // Render sections
            const sectionsEl = document.getElementById('sections');
            sectionsEl.innerHTML = '';

            brief.sections.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `section-${section.id}`;
                sectionDiv.className = 'section hidden';
                sectionDiv.innerHTML = renderSection(section);
                sectionsEl.appendChild(sectionDiv);
            });

            // Render "All News" section if available
            if (brief.all_items && brief.all_items.length > 0) {
                const allNewsDiv = document.createElement('div');
                allNewsDiv.id = 'section-all_news';
                allNewsDiv.className = 'section hidden';
                allNewsDiv.innerHTML = renderAllNews(brief.all_items, brief);
                sectionsEl.appendChild(allNewsDiv);
            }

            // Update footer
            document.getElementById('lastUpdated').textContent = formatDateTime(brief.generated_at);
            document.getElementById('sourcesChecked').textContent = brief.stats.sources_checked;
            document.getElementById('itemsProcessed').textContent = brief.stats.items_processed;
            document.getElementById('itemsFeatured').textContent = brief.stats.items_featured;

            // Show content
            document.getElementById('tabNav').classList.remove('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('footer').classList.remove('hidden');

            // Switch to first section
            if (brief.sections.length > 0) {
                switchSection(brief.sections[0].id);
            }
        }

        // Render a section
        function renderSection(section) {
            let html = `
                <div class="mb-6">
                    <h2 class="text-2xl font-bold mb-6 flex items-center">
                        <span class="section-emoji">${section.emoji}</span>
                        ${section.title}
                    </h2>
                    <div class="space-y-4">
            `;

            section.items.forEach(item => {
                html += `
                    <div class="card p-6 rounded-lg">
                        <div class="mb-3">
                            <h3 class="text-xl font-semibold mb-2">
                                <a href="${item.url}" target="_blank" rel="noopener"
                                   class="hover:text-purple-400 transition-colors">
                                    ${item.title}
                                </a>
                            </h3>
                            <div class="meta-info">
                                <span class="source-badge">${item.source}</span>
                                ${item.published ? `<span class="published-date">${item.published}</span>` : ''}
                            </div>
                        </div>
                        <p class="text-gray-300 leading-relaxed">${item.summary}</p>
                        ${item.why_it_matters ? `
                            <div class="why-matters">
                                <p class="text-sm text-purple-200">
                                    <strong>Why it matters:</strong> ${item.why_it_matters}
                                </p>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        // Render all news section
        function renderAllNews(allItems, brief) {
            // Get all featured URLs for comparison
            const featuredUrls = new Set();
            brief.sections.forEach(section => {
                section.items.forEach(item => {
                    featuredUrls.add(item.url);
                });
            });

            let html = `
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-2xl font-bold flex items-center">
                            <span class="section-emoji">📰</span>
                            All News
                        </h2>
                        <div class="flex gap-2">
                            <span class="stats-badge">${allItems.length} total</span>
                            <span class="stats-badge">${featuredUrls.size} featured</span>
                        </div>
                    </div>
                    <div class="filter-bar">
                        <input
                            type="text"
                            id="newsFilter"
                            class="filter-input"
                            placeholder="🔍 Search by title, source, or content..."
                            onkeyup="filterAllNews()"
                        />
                    </div>
                    <div id="allNewsContainer" class="space-y-4">
            `;

            allItems.forEach(item => {
                const isFeatured = featuredUrls.has(item.url);
                html += `
                    <div class="card p-5 rounded-lg all-news-item" data-title="${(item.title || '').toLowerCase()}" data-source="${(item.source || '').toLowerCase()}" data-summary="${(item.summary || '').toLowerCase()}">
                        <div class="mb-3">
                            <h3 class="text-lg font-semibold mb-2">
                                <a href="${item.url || '#'}" target="_blank" rel="noopener"
                                   class="hover:text-purple-400 transition-colors">
                                    ${item.title || 'No title'}
                                </a>
                            </h3>
                            <div class="meta-info">
                                <span class="source-badge">${item.source || item.source_type || 'Unknown'}</span>
                                ${item.published ? `<span class="published-date">${new Date(item.published).toLocaleDateString()}</span>` : ''}
                                ${isFeatured ? `<span class="featured-indicator">✨ Featured</span>` : ''}
                            </div>
                        </div>
                        ${item.summary ? `<p class="text-gray-400 text-sm leading-relaxed">${item.summary}</p>` : ''}
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        // Filter all news
        function filterAllNews() {
            const filter = document.getElementById('newsFilter').value.toLowerCase();
            const items = document.querySelectorAll('.all-news-item');

            items.forEach(item => {
                const title = item.getAttribute('data-title');
                const source = item.getAttribute('data-source');
                const summary = item.getAttribute('data-summary');

                if (title.includes(filter) || source.includes(filter) || summary.includes(filter)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Switch to a section
        function switchSection(sectionId) {
            // Build list of all section IDs
            const allSectionIds = currentBrief.sections.map(s => s.id);
            if (currentBrief.all_items && currentBrief.all_items.length > 0) {
                allSectionIds.push('all_news');
            }

            // Update tabs
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, index) => {
                if (allSectionIds[index] === sectionId) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            // Update sections
            const sections = document.querySelectorAll('.section');
            sections.forEach(section => {
                if (section.id === `section-${sectionId}`) {
                    section.classList.remove('hidden');
                } else {
                    section.classList.add('hidden');
                }
            });

            currentSection = sectionId;
        }

        // Load archive dates
        async function loadArchive() {
            try {
                const response = await fetch('../data/archive/index.json');
                if (!response.ok) return;

                const dates = await response.json();
                const dropdown = document.getElementById('archiveDropdown');

                dropdown.innerHTML = dates.map(date => `
                    <div class="archive-item" onclick="loadArchiveDate('${date}')">
                        ${formatDate(date)}
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading archive:', error);
            }
        }

        // Load a specific archive date
        function loadArchiveDate(date) {
            document.getElementById('archiveDropdown').classList.remove('show');
            loadBrief(date);
        }

        // Toggle archive dropdown
        document.getElementById('archiveBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('archiveDropdown');
            dropdown.classList.toggle('show');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            document.getElementById('archiveDropdown').classList.remove('show');
        });

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Format datetime
        function formatDateTime(isoStr) {
            const date = new Date(isoStr);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Initialize
        loadBrief();
        loadArchive();
    </script>
</body>
</html>
